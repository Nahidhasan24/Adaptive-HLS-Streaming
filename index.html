<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive Streaming Modern Player</title>

  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />

  <!-- Video.js Quality Selector Plugin CSS -->
  <link href="https://cdn.jsdelivr.net/npm/videojs-http-source-selector@1.1.12/dist/videojs-http-source-selector.css" rel="stylesheet">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #121212;
    }
    .video-container {
      width: 720px;
      max-width: 90%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    .vjs-big-play-button {
      font-size: 3em;
      border-radius: 50%;
      padding: 1em;
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

<div class="video-container">
  <video
    id="my-video"
    class="video-js vjs-big-play-centered vjs-theme-city"
    controls
    preload="auto"
    width="720"
    height="400"
    data-setup='{}'>
    <source src="videos/master.m3u8" type="application/x-mpegURL" />
  </video>
</div>

<!-- Video.js JS -->
<script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>

<!-- Quality Selector Plugin -->
<script src="https://cdn.jsdelivr.net/npm/videojs-http-source-selector@1.1.12/dist/videojs-http-source-selector.min.js"></script>

<script>
  const player = videojs('my-video');

  player.ready(function() {
    console.log('Player is ready');

    // Enable the quality selector plugin
    player.httpSourceSelector();

    // Attempt autoplay
    player.play().catch(() => {
      console.log('Autoplay blocked, waiting for user interaction');
    });
  });
</script>

</body>
</html>
